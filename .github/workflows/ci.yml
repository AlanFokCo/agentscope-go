name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - "*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go env
        run: go env

      - name: Build module
        run: go build ./...

      - name: Build examples
        run: go build ./examples/...

      - name: Run go vet
        run: go vet ./...

      # Placeholder for tests; once tests are added, this step will enforce them in CI.
      - name: Run tests (if any)
        run: go test ./... || true

